<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Documents - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0b1e33 0%, #1c3a5c 50%, #2d5a87 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 2.5rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-logo {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #1e3b5a, #0b1e33);
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 10px 25px rgba(11, 30, 51, 0.3);
    }

    .login-logo i {
      font-size: 2rem;
      color: #7bb3ff;
    }

    .login-header h1 {
      font-size: 1.8rem;
      color: #0b1e33;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .login-header p {
      color: #6b7d95;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #2c3b55;
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: #8c9bb0;
      font-size: 1rem;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.9rem 1.2rem 0.9rem 3rem;
      border: 2px solid #e2e8f0;
      border-radius: 1.2rem;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
      background: #f8fafd;
    }

    .input-wrapper input:focus {
      border-color: #1e3b5a;
      box-shadow: 0 0 0 4px rgba(27, 55, 96, 0.1);
      background: white;
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #5c6f87;
      cursor: pointer;
    }

    .forgot-password {
      font-size: 0.85rem;
      color: #1e3b5a;
      text-decoration: none;
      font-weight: 600;
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #1e3b5a, #0b1e33);
      color: white;
      border: none;
      border-radius: 1.2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(11, 30, 51, 0.3);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(11, 30, 51, 0.4);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 2rem 0;
      color: #8c9bb0;
      font-size: 0.85rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .divider span {
      padding: 0 1rem;
    }

    .google-btn {
      width: 100%;
      padding: 0.9rem;
      background: white;
      color: #2c3b55;
      border: 2px solid #e2e8f0;
      border-radius: 1.2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      transition: all 0.3s;
    }

    .google-btn:hover {
      background: #f8fafd;
      border-color: #c4d0e0;
    }

    .signup-link {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #5c6f87;
    }

    .signup-link a {
      color: #1e3b5a;
      font-weight: 600;
      text-decoration: none;
    }

    .error-message {
      background: #fee9e9;
      color: #c94040;
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    @media (max-width: 500px) {
      .login-card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <i class="fas fa-cloud"></i>
        </div>
        <h1>IT Documents</h1>
        <p>Sign in to your knowledge base</p>
      </div>

      <div class="error-message" id="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <div class="remember-forgot">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <a href="#" class="forgot-password" onclick="alert('Contact admin to reset password')">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="divider">
        <span>or</span>
      </div>

      <button class="google-btn" onclick="signInWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>

      <div class="signup-link">
        Don't have an account? <a href="#" onclick="alert('Contact admin to create account')">Contact Admin</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
